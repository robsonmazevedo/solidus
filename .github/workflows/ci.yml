name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore Solidus.slnx

      - name: Build
        run: dotnet build Solidus.slnx -c Release --no-restore

      - name: Test
        run: >
          dotnet test Solidus.slnx
          -c Release
          --no-build
          --logger trx
          --collect "XPlat Code Coverage"
          --results-directory ./TestResults

      - name: Publicar resultados dos testes
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Testes unitarios
          path: TestResults/**/*.trx
          reporter: dotnet-trx

      - name: Upload cobertura
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cobertura
          path: TestResults/**/coverage.cobertura.xml
          if-no-files-found: warn
