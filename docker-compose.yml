name: solidus

services:

  # ── Bancos de dados ──────────────────────────────────────────────────────

  postgres-registros:
    image: postgres:16-alpine
    container_name: solidus-postgres-registros
    environment:
      POSTGRES_DB: ${POSTGRES_REGISTROS_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_REGISTROS_PASSWORD}
    ports:
      - "${PORT_POSTGRES_REGISTROS}:${POSTGRES_INTERNAL_PORT}"
    volumes:
      - postgres_registros_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_REGISTROS_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - solidus

  postgres-posicao:
    image: postgres:16-alpine
    container_name: solidus-postgres-posicao
    environment:
      POSTGRES_DB: ${POSTGRES_POSICAO_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_POSICAO_PASSWORD}
    ports:
      - "${PORT_POSTGRES_POSICAO}:${POSTGRES_INTERNAL_PORT}"
    volumes:
      - postgres_posicao_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_POSICAO_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - solidus

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: solidus-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "${PORT_PGADMIN}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres-registros:
        condition: service_healthy
      postgres-posicao:
        condition: service_healthy
    networks:
      - solidus

  # ── Broker ───────────────────────────────────────────────────────────────

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: solidus-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "${PORT_RABBITMQ}:5672"
      - "${PORT_RABBITMQ_MANAGEMENT}:15672"
      - "${PORT_RABBITMQ_PROMETHEUS}:15692"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./infra/rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - solidus

  # ── Cache ────────────────────────────────────────────────────────────────

  redis:
    image: redis:7-alpine
    container_name: solidus-redis
    ports:
      - "${PORT_REDIS}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - solidus

  redisinsight:
    image: redis/redisinsight:2.50
    container_name: solidus-redisinsight
    ports:
      - "${PORT_REDISINSIGHT}:5540"
    volumes:
      - redisinsight_data:/data
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - solidus

  # ── Observabilidade ──────────────────────────────────────────────────────

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: solidus-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "${PORT_JAEGER_UI}:16686"
      - "${PORT_JAEGER_GRPC}:4317"
      - "${PORT_JAEGER_HTTP}:4318"
    networks:
      - solidus

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: solidus-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "${PORT_PROMETHEUS}:9090"
    networks:
      - solidus

  grafana:
    image: grafana/grafana:10.4.2
    container_name: solidus-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "${PORT_GRAFANA}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - solidus

  redis-exporter:
    image: oliver006/redis_exporter:v1.61.0
    container_name: solidus-redis-exporter
    environment:
      REDIS_ADDR: ${REDIS_EXPORTER_ADDR}
    ports:
      - "${PORT_REDIS_EXPORTER}:9121"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - solidus

  # ── Qualidade de código ──────────────────────────────────────────────────

  sonarqube:
    image: sonarqube:10.5-community
    container_name: solidus-sonarqube
    environment:
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    ports:
      - "${PORT_SONARQUBE}:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
    networks:
      - solidus

  # ── Serviços .NET ────────────────────────────────────────────────────────

  registros-api:
    build:
      context: .
      dockerfile: src/Solidus.Registros.API/Dockerfile
    container_name: solidus-registros-api
    environment:
      ASPNETCORE_ENVIRONMENT: ${APP_ENVIRONMENT}
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Registros: ${REGISTROS_CONNECTION_STRING}
      RabbitMQ__Host: ${RABBITMQ_HOST}
      RabbitMQ__User: ${RABBITMQ_USER}
      RabbitMQ__Password: ${RABBITMQ_PASSWORD}
      Jwt__Secret: ${JWT_SECRET}
      Jwt__Issuer: ${JWT_ISSUER}
      Otlp__Endpoint: ${OTLP_ENDPOINT}
    ports:
      - "${PORT_REGISTROS_API}:8080"
    depends_on:
      postgres-registros:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - solidus

  posicao-api:
    build:
      context: .
      dockerfile: src/Solidus.Posicao.API/Dockerfile
    container_name: solidus-posicao-api
    environment:
      ASPNETCORE_ENVIRONMENT: ${APP_ENVIRONMENT}
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Posicao: ${POSICAO_CONNECTION_STRING}
      ConnectionStrings__Redis: ${REDIS_CONNECTION}
      Jwt__Secret: ${JWT_SECRET}
      Jwt__Issuer: ${JWT_ISSUER}
      Otlp__Endpoint: ${OTLP_ENDPOINT}
    ports:
      - "${PORT_POSICAO_API}:8080"
    depends_on:
      postgres-posicao:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - solidus

  posicao-processor:
    build:
      context: .
      dockerfile: src/Solidus.Posicao.Processor/Dockerfile
    container_name: solidus-posicao-processor
    environment:
      DOTNET_ENVIRONMENT: ${APP_ENVIRONMENT}
      ConnectionStrings__Posicao: ${POSICAO_CONNECTION_STRING}
      RabbitMQ__Host: ${RABBITMQ_HOST}
      RabbitMQ__User: ${RABBITMQ_USER}
      RabbitMQ__Password: ${RABBITMQ_PASSWORD}
      Otlp__Endpoint: ${OTLP_ENDPOINT}
      Prometheus__Endpoint: ${PROMETHEUS_ENDPOINT}
    ports:
      - "${PORT_PROCESSOR_METRICS}:8082"
    depends_on:
      postgres-posicao:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - solidus

# ── Volumes

volumes:
  postgres_registros_data:
  postgres_posicao_data:
  rabbitmq_data:
  redis_data:
  prometheus_data:
  grafana_data:
  sonarqube_data:
  sonarqube_logs:
  pgadmin_data:
  redisinsight_data:

# ── Rede ─────────────────────────────────────────────────────────────────

networks:
  solidus:
    driver: bridge
