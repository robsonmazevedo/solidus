global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: registros-api
    static_configs:
      - targets: ["registros-api:8080"]
    metrics_path: /metrics

  - job_name: posicao-api
    static_configs:
      - targets: ["posicao-api:8080"]
    metrics_path: /metrics

  - job_name: posicao-processor
    static_configs:
      - targets: ["posicao-processor:8082"]
    metrics_path: /metrics

  - job_name: rabbitmq
    static_configs:
      - targets: ["rabbitmq:15692"]
    metrics_path: /metrics

  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]
    metrics_path: /metrics
